name: Compatibility

on:
  push:
    branches: [main]
    paths:
      - "packages/autoskills/**"
  pull_request:
    branches: [main]
    paths:
      - "packages/autoskills/**"

permissions:
  contents: read

jobs:
  compat:
    name: Node ${{ matrix.node-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 23, 24]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install
        working-directory: packages/autoskills

      - name: Run tests
        run: npm test
        working-directory: packages/autoskills
